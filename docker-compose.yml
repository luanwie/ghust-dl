version: "3.8"

services:
  slskd:
    image: slskd/slskd:latest
    container_name: ghust-slskd
    ports:
      - "5030:5030"
    volumes:
      - ./slskd-config:/app/config
      - ./cache:/app/downloads
    environment:
      - SLSKD_REMOTE_CONFIGURATION=true
      - SLSKD_SLSK_USERNAME=ghust-dl
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: ghust-backend
    ports:
      - "8000:8000"
    volumes:
      - ./cache:/cache
      - ./backend:/app
    environment:
      - SLSKD_URL=http://slskd:5030
      - CACHE_DIR=/cache
      - PORT=8000
    depends_on:
      - slskd
    restart: unless-stopped
